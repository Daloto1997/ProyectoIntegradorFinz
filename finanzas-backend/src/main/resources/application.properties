# ==========================================
# Configuración de Base de Datos - MySQL
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/finanzas_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# Configuración JPA / Hibernate
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ==========================================
# Configuración del Servidor
# ==========================================
server.port=8080
server.servlet.context-path=/api

# ==========================================
# Configuración de Jackson (serialización JSON)
# ==========================================
# Hace que las fechas salgan como "2026-01-15" en vez de [2026,1,15,0,0,0]
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# ==========================================
# Configuración de Logging
# ==========================================
logging.level.com.finanzas=DEBUG

